<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styleComponenteCadastroAvisosEventos.css">
    <title>Document</title>
</head>
<body>
    <div id="container-principal">

        <div class="header">
            <h2>Detalhes do evento</h2>
            <div id="header-botoes">
                <button><img src="./images/icone-aviso-preto.svg"></button>
                <button><img src="./images/close_X.svg"></button>
            </div>
        </div>
        <hr>
        

        <div id="detalhes-do-evento">
            

            <span id="tipo_evento">Oficina</span>
            <h1>Oficina de Artesanato</h1>
            <span id="descricao_evento">Aprenda técnicas de crochê e tricô. Traga seus próprios materiais.</span>

            <div id="conjunto-detalhes">
                <div class="caixa_info">
                    <img src="./images/icone-verde-claro-calendario.svg">
                    <div class="dois_textos_info">
                        <h3 class="texto_grande_preto">domingo, 19 de abril</h3>
                        <span class="texto_pequeno_cinza">10:00</span>
                    </div>
                </div>

                <div class="caixa_info">
                    <img src="./images/icone-verde-claro-pin.svg">
                    <div class="dois_textos_info">
                        <h3 class="texto_grande_preto">Local</h3>
                        <span class="texto_pequeno_cinza">Sala Multiuso - Rua das Flores, 123</span>
                    </div>
                </div>

                <div class="caixa_info">
                    <img src="./images/icone-verde-claro-pessoa.svg">
                    <div class="dois_textos_info">
                        <h3 class="texto_grande_preto">Organizado por</h3>
                        <span class="texto_pequeno_cinza">Ana Santos</span>
                    </div>
                </div>

                <div class="caixa_info">
                    <img src="./images/icone-verde-claro-duas-pessoas.svg">
                    <div class="dois_textos_info">
                        <h3 class="texto_grande_preto">Participantes</h3>
                        <span class="texto_pequeno_cinza">8 pessoas confirmadas</span>
                    </div>
                </div>
            </div>

        </div>

        <div id="avisos-evento">

        </div>

        <div id="criar-evento">
            <form>
                <fieldset>
                    <label for="nome-evento">Nome do Evento *</label><br>
                    <div class="input-com-icone">
                        <input type="text" id="nome-evento" placeholder="Ex: Reunião do Conselho" required>
                        <button>
                            <img src="./images/icone-microfone-verde.svg">
                        </button>
                    </div>
                    <br>

                    <label for="tipo-evento">Tipo de Evento *</label><br>
                    <select name="tipo-evento" required>
                        <option value="a">A</option>
                        <option value="b">B</option>
                        <option value="c">C</option>
                        <option value="d">D</option>
                        <option value="e">E</option>
                    </select>
                    <br>

                    <div id="data-horario">
                        <div class="input-com-icone">
                            <label for="data">Data *</label><br>
                            <input class="input-preto" type="date" id="data" required>
                            <br>
                        </div>

                        <div>
                            <label for="time">Horário *</label><br>
                            <input class="input-preto" type="time" required>
                            <br>
                        </div>
                    </div>

                    <label for="local-evento">Local *</label><br>
                    <div class="input-com-icone">
                        <input type="text" id="local-evento" placeholder="Ex: Centro Comunitário" required>
                        <button>
                            <img src="./images/icone-microfone-verde.svg">
                        </button>
                    </div>
                    <br>

                    <label for="descricao">Descrição</label><br>
                    <div class="input-com-icone">
                        <textarea id="descricao" name="userReview" placeholder="Descreva o evento..." cols="100" rows="6"></textarea>
                        <button id="textarea-btn">
                            <img src="./images/icone-microfone-verde.svg">
                        </button>
                    </div>

                </fieldset>
            </form>
        </div>

        <div id="criar-aviso">
            <fieldset>
                <label for="selecionar-evento">Selecione o Evento</label><br>
                <select id="tipo-evento" name="selecionar-evento" required>
                    <option value="a">A</option>
                    <option value="b">B</option>
                    <option value="c">C</option>
                    <option value="d">D</option>
                    <option value="e">E</option>
                </select>
                <br>

                <label for="msg-aviso">Mensagem do Aviso</label><br>
                <div class="msg-aviso">
                    <textarea id="descricao" name="userReview" placeholder="Ex: Lembrete importante! Não esqueça de trazer seus materiais..." cols="100" rows="6"></textarea>
                    <button id="textarea-btn">
                        <img src="./images/icone-microfone-verde.svg">
                    </button>
                </div>
            </fieldset>
        </div>

        <div id="adicionar-mobilizadora">

        </div>

        <hr id="hr-footer">
        <div id="footer">
            <button id="confirmar-presenca">Confirmar Presença</button>
        </div>       
    </div>
</body>
</html>
