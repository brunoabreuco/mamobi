<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.meu_perfil.css">
    <link rel="stylesheet" href="./css/style.header.css">
    <link rel="stylesheet" href="./css/style.footer.css">
    <title>Document</title>
</head>
<body>
     <div id="header"></div>
    <div class="foto_nome">
        <img class="foto_perfil" src="./images/icone_perfil.svg">
        <h2 id="nome">Maria Fernanda</h2>
        <p id="subtitulo">Usuária Padrão</p>
    </div>

    <div class="info_baixo">
        <h2>Suas Estatísticas</h2>
        <div id="caixas">

            <div class="caixa" id="caixa_verde">
                <div class="icone_participou">
                    <img class="icone" id="medalha" src="./images/icone_medalha_verde.svg">
                    <h3>Criou</h3>
                </div>
        
                <span>3</span>
                <p>eventos confirmados</p>
            </div>

            <div class="caixa" id="caixa_vermelha">
                <div class="icone_participou">
                    <img class="icone" id="medalha" src="./images/icone_medalha_vermelha.svg">
                    <h3>Participou de</h3>
                </div>
        
                <span>3</span>
                <p>eventos confirmados</p>
            </div>

        </div>

        <h2>Ações de Mobilizadora</h2>
        <div class="botoes">
            <button class="botao" id="botao_azul">
                <img src="./images/icone_noticicacao_azul.svg">
                Enviar Avisos
            </button>
            <button class="botao" id="botao_vermelho">
                <img src="./images/pessoa_mais_vermelho.svg">
                Adicionar Mobilizadora
            </button>
        </div>

        <h2>Menu</h2>
        <div class="menu">
            <div class="icone_descricao">
                <img class="icone" src="./images/icone_configuracao.svg">
                <a href="#">Configuracoes</a>
            </div>
            
            <div class="icone_descricao">
                <img class="icone" src="./images/icone_ajuda.svg">
                <a href="#">Ajuda</a>
            </div>

            <div class="icone_descricao">
                <img class="icone" src="./images/icone_sair.svg">
                <a href="#" id="texto_sair">Sair</a>
            </div>    
        </div>
    </div>
     <div id="footer"></div>
     <script src="./js/components.js"></script>
</body>

</html>
