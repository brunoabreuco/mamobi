<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="./css/style.meu_perfil.css">
    <link rel="stylesheet" href="./css/style.header.css">
    <link rel="stylesheet" href="./css/style.footer.css">
    <link rel="stylesheet" href="./css/styleComponenteCadastroAvisosEventos.css">
    <link rel="stylesheet" href="./css/styleComponenteBotaoVoz.css">
    <title>Mães Mobilizadoras</title>
    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
</head>
<body style="background-color: #f5ede9" style="position: relative">
    <!-- TELA DE LOADING -->
    <div id="loading-screen" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(245, 237, 233, 0.85);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
        pointer-events: none;
    ">
        <div style="text-align: center; pointer-events: none;">
            <div style="
                width: 40px;
                height: 40px;
                border: 3px solid #d0d0d0;
                border-top-color: #00636A;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                margin: 0 auto 16px auto;
            "></div>
            <p style="
                margin: 0;
                color: #4a4a4a;
                font-family: 'Inter', sans-serif;
                font-weight: 300;
                font-size: 16px;
                letter-spacing: 0.5px;
            ">Carregando...</p>
        </div>
    </div>

     <div id="header" data-spec="header" data-prop-titulo="Meu perfil"></div>
    <div class="foto_nome">
        <img class="foto_perfil" src="./images/icone_perfil.svg">
        <h2 id="nome"></h2> 
        <p id="subtitulo"></p>
    </div>

    <div class="info_baixo">
        <h2>Suas Estatísticas</h2>
        <div id="caixas">

            <div class="caixa participante-hide" id="caixa_verde">
                <div class="icone_participou">
                    <img class="icone" id="medalha" src="./images/icone_medalha_verde.svg">
                    <h3>Criou</h3>
                </div>
        
                <span id="numero_eventos_criou"></span>
                <p>eventos confirmados</p>
            </div>

            <div class="caixa" id="caixa_vermelha">
                <div class="icone_participou">
                    <img class="icone" id="medalha" src="./images/icone_medalha_vermelha.svg">
                    <h3>Participou de</h3>
                </div>
        
                <span id="numero_eventos_participou"></span>
                <p>eventos confirmados</p>
            </div>

        </div>

        <h2 class="participante-hide">Ações de Mobilizadora</h2>
        <div class="botoes">
            <button class="botao" id="botao_azul">
                <img src="./images/icone_noticicacao_azul.svg">
                Enviar Avisos
            </button>
            <button class="botao" id="botao_vermelho">
                <img src="./images/pessoa_mais_vermelho.svg">
                Adicionar Mobilizadora
            </button>
        </div>

        <h2>Menu</h2>
        <div class="menu">
            <div class="icone_descricao">
                <img class="icone" src="./images/icone_configuracao.svg">
                <a href="#">Configurações</a>
            </div>
            
            <div class="icone_descricao">
                <img class="icone" src="./images/icone_ajuda.svg">
                <a href="#">Ajuda</a>
            </div>

            <div class="icone_descricao">
                <img class="icone" src="./images/icone_sair.svg">
                <a href="#" id="texto_sair">Sair</a>
            </div>    
        </div>
    </div>

    <div id="modal-container" data-spec="componenteCadastroAvisosEventos"></div>
    
    <!-- 🔹 MODAL DE CONFIRMAÇÃO DE LOGOUT -->
    <div id="confirmacao-logout" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.5);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 20000;
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
    ">
        <div style="
            background-color: #F5EDE9;
            padding: 30px 24px;
            border-radius: 20px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        ">
            <h3 style="
                font-family: 'Inter', sans-serif;
                font-weight: 600;
                font-size: 18px;
                margin-bottom: 12px;
                color: #1a1a1a;
            ">Sair</h3>
            <p style="
                font-family: 'Inter', sans-serif;
                font-weight: 400;
                font-size: 15px;
                color: #3E3F41;
                margin-bottom: 24px;
            ">Tem certeza que deseja sair da sua conta?</p>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button id="cancelar-logout" style="
                    background-color: transparent;
                    border: 1px solid #CFCFCF;
                    border-radius: 12px;
                    padding: 10px 24px;
                    font-family: 'Inter', sans-serif;
                    font-weight: 500;
                    font-size: 14px;
                    cursor: pointer;
                    transition: background-color 0.2s;
                ">Cancelar</button>
                <button id="confirmar-logout" style="
                    background-color: #D35746;
                    border: none;
                    border-radius: 12px;
                    padding: 10px 24px;
                    font-family: 'Inter', sans-serif;
                    font-weight: 500;
                    font-size: 14px;
                    color: white;
                    cursor: pointer;
                    transition: background-color 0.2s;
                ">Sair</button>
            </div>
        </div>
    </div>

     <div id="footer" data-spec="footer"></div>
     
    <script src="js/api.js"></script>
    <script src="js/exige-login.js"></script>
     <script src="./js/components.js"></script>
     <script src="./js/script-header.js"></script>
     <script src="./js/script-footer.js"></script>
     <script src="./js/scriptComponenteCadastroAvisosEventos.js"></script>
     <script src="./js/notifications.js"></script>
     <script src="./js/script-tela-perfil.js"></script>
    <script src="./js/scriptComponenteBotaoVoz.js"></script>
</body>
</html>
