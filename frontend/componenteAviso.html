<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styleComponenteAviso.css">
    <title>Document</title>
</head>
<body>
    <div class="conteudo" id="pessoas_confirmadas">
        <div class="direita">
            <div class="container_imagem">
                <img class="icone" src="./images/icone-duas_pessoas_verde.svg">
            </div>

            <div class="info">
                <h1>12 pessoas confirmadas</h1>
                <h2>A Reunião do Conselho Comunitário já tem 12 participantes confirmados</h2>
                <p>há 1 dia</p>
            </div>
        </div>

        <img class="novo" src="./images/bola_verde_novo_aviso.svg">
    </div>

    <div class="conteudo" id="novo_evento">
        <div class="direita">
            <div class="container_imagem">
                <img class="icone" src="./images/icone_calendario_verde.svg">
            </div>

            <div class="info">
                <h1>Novo evento criado</h1>
                <h2>Maria Silva criou o evento “Reunião do Conselho Comunitário”</h2>
                <p>há 1 dia</p>
            </div>
        </div>

        <img class="novo" src="./images/bola_verde_novo_aviso.svg">
    </div>

    <div class="conteudo" id="lembrete">
        <div class="direita">
            <div class="container_imagem">
                <img class="icone" src="./images/icone-megafone-verde.svg">
            </div>

            <div class="info">
                <h1>Lembrete: Mutirão amanhã</h1>
                <h2>Não esqueça do Mutirão de Limpeza da Praça amanhã às 8h.</h2>
                <p>há 1 dia</p>
            </div>
        </div>

        <img class="novo" src="./images/bola_verde_novo_aviso.svg">
    </div>

    <hr>
</body>
</html>
